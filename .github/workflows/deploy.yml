# .github/workflows/deploy.yml
name: ML Model CI/CD Pipeline

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ml-model-app
  AWS_REGION: us-east-1
  S3_BUCKET: proyectofinalmlops
  PYTHON_VERSION: '3.9'

jobs:
  # Job 1: Ejecutar pruebas unitarias
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download test data and model from S3
        run: |
          echo "Downloading artifacts from S3..."
          python scripts/download_artifacts.py

          # Verificar que los archivos se descargaron
          echo "Checking downloaded files..."
          ls -la artifacts/

      - name: Run unit tests from pruebas/
        run: |
          echo "Running tests from pruebas/ directory..."

          # Ejecutar test_1.py
          echo "Running test_1.py..."
          python pruebas/test_1.py

          # Ejecutar test_2.py
          echo "Running test_2.py..."
          python pruebas/test_2.py

      - name: Run pytest tests
        run: |
          echo "Running pytest tests..."

          # Crear directorio para reportes
          mkdir -p test-reports

          # Ejecutar pytest con cobertura y reporte HTML
          pytest tests/ \
            --verbose \
            --junit-xml=test-reports/junit.xml \
            --html=test-reports/report.html \
            --self-contained-html \
            --cov=app \
            --cov-report=html:test-reports/coverage \
            --cov-report=term

      - name: Generate test report
        if: always()
        run: |
          python scripts/generate_test_report.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            test-reports/
            test_reports/
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test-reports/junit.xml ]; then
            echo "✅ Pytest tests executed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Pytest tests failed to execute" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test artifacts have been uploaded" >> $GITHUB_STEP_SUMMARY

  # Job 2: Build y Deploy (solo si las pruebas pasan)
  build-and-deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    # Solo ejecutar en push a dev o prod, no en PR
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/prod')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "PORT=8501" >> $GITHUB_ENV
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "PORT=8502" >> $GITHUB_ENV
            echo "DEPLOY_ENV=development" >> $GITHUB_ENV
          fi

          echo "Deploying to: ${{ env.DEPLOY_ENV }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ env.ENVIRONMENT }}-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            ENVIRONMENT=${{ env.ENVIRONMENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to AWS ECS
        run: |
          echo "Deploying to ${{ env.ENVIRONMENT }} environment..."

          # Obtener la primera etiqueta de la lista
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)

          python scripts/deploy_to_ecs.py \
            --environment ${{ env.ENVIRONMENT }} \
            --image $FIRST_TAG

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 60

      - name: Health check
        run: |
          python scripts/health_check.py \
            --environment ${{ env.ENVIRONMENT }} \
            --max-retries 5 \
            --retry-delay 30

      - name: Deployment Summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Deployment completed" >> $GITHUB_STEP_SUMMARY

  # Job 3: Verificación post-deploy (opcional)
  verify-deployment:
    name: Verify Deployment
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/prod')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install minimal dependencies
        run: |
          pip install requests boto3 python-dotenv

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify prediction logging
        run: |
          echo "Checking if prediction logging is working..."

          ENVIRONMENT="${{ github.ref == 'refs/heads/prod' && 'prod' || 'dev' }}"

          # Script inline para verificar logs
          python << EOF
          import boto3
          import os

          s3 = boto3.client('s3')
          bucket = '${{ env.S3_BUCKET }}'
          key = f"predictions/predicciones_{os.environ.get('ENVIRONMENT', 'dev')}.txt"

          try:
              response = s3.head_object(Bucket=bucket, Key=key)
              print(f"✅ Prediction log file exists: {key}")
              print(f"   Last modified: {response['LastModified']}")
              print(f"   Size: {response['ContentLength']} bytes")
          except s3.exceptions.NoSuchKey:
              print(f"⚠️  Prediction log file not found: {key}")
              print("   This is expected for first deployment")
          except Exception as e:
              print(f"❌ Error checking prediction log: {e}")
          EOF

      - name: Final Summary
        run: |
          echo "### Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Tests:** Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build:** Successful" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deploy:** Completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Health Check:** Passed" >> $GITHUB_STEP_SUMMARY

  # Workflow para solo ejecutar tests en otras ramas
  # Esto permite probar cambios sin desplegar
  test-only:
    name: Test Only (Non-deployment branches)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' || 
      (github.event_name == 'push' && 
       github.ref != 'refs/heads/dev' && 
       github.ref != 'refs/heads/prod')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download test data
        run: python scripts/download_artifacts.py

      - name: Run tests
        run: |
          python pruebas/test_1.py
          python pruebas/test_2.py
          pytest tests/ -v

      - name: ✅ Tests completed
        run: echo "✅ All tests passed! Ready for deployment."
