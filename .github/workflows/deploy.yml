# .github/workflows/deploy.yml
name: ML Model CI/CD Pipeline

on:
  push:
    branches: [Dev, Prod]
  pull_request:
    branches: [Dev, Prod]

# Permisos necesarios para el workflow
permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ml-model-app
  AWS_REGION: us-east-1
  S3_BUCKET: proyectofinalmlops
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Ejecutar pruebas unitarias
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html

      - name: 💬 Comment PR - Starting CI/CD
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 CI/CD en acción. Ejecutando pruebas...'
            })

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📥 Download test data and model from S3
        run: |
          echo "📥 Downloading artifacts from S3..."
          python scripts/download_artifacts.py

          # Verificar que los archivos se descargaron
          echo "📁 Checking downloaded files..."
          ls -la artifacts/

      - name: 🧪 Run unit tests from pruebas/
        run: |
          echo "🧪 Running tests from pruebas/ directory..."

          # Ejecutar test_1.py
          echo "Running test_1.py..."
          python pruebas/test_1.py

          # Ejecutar test_2.py
          echo "Running test_2.py..."
          python pruebas/test_2.py

      - name: 🧪 Run pytest tests
        run: |
          echo "🧪 Running pytest tests..."

          # Crear directorio para reportes
          mkdir -p test-reports

          # Ejecutar pytest con cobertura y reporte HTML
          pytest tests/ \
            --verbose \
            --junit-xml=test-reports/junit.xml \
            --html=test-reports/report.html \
            --self-contained-html \
            --cov=app \
            --cov-report=html:test-reports/coverage \
            --cov-report=term || true

      - name: 📊 Generate test report
        if: always()
        run: |
          python scripts/generate_test_report.py || echo "Report generation skipped"

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-reports/
            test_reports/
          retention-days: 30

      - name: 💬 Comment PR - Tests Success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ CI/CD terminado con éxito. Todas las pruebas pasaron.'
            })

      - name: 💬 Comment PR - Tests Failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI/CD terminado con error. Revisa los logs para más detalles.'
            })

  # Job 2: Build Docker Image
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set environment variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "PORT=8501" >> $GITHUB_ENV
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "PORT=8502" >> $GITHUB_ENV
            echo "DEPLOY_ENV=development" >> $GITHUB_ENV
          fi

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.ENVIRONMENT }}-latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            ENVIRONMENT=${{ env.ENVIRONMENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📝 Image Summary
        run: |
          echo "### Docker Image Built 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  # Job 3: Deploy (solo en push a dev o prod)
  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && 
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/prod')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install deployment dependencies
        run: |
          pip install boto3 requests python-dotenv

      - name: 🔧 Set environment
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/prod" ]]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
          fi

      - name: 🔐 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🚀 Deploy to AWS ECS
        run: |
          echo "🚀 Deploying to ${{ env.ENVIRONMENT }} environment..."

          # Obtener la primera etiqueta de la lista
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.ENVIRONMENT }}-latest"

          python scripts/deploy_to_ecs.py \
            --environment ${{ env.ENVIRONMENT }} \
            --image $IMAGE_TAG || echo "⚠️ Deployment script not found or failed"

      - name: ⏳ Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to stabilize..."
          sleep 60

      - name: 🏥 Health check
        run: |
          python scripts/health_check.py \
            --environment ${{ env.ENVIRONMENT }} \
            --max-retries 5 \
            --retry-delay 30 || echo "⚠️ Health check script not found or failed"

      - name: 🔍 Verify prediction logging
        run: |
          echo "🔍 Checking if prediction logging is working..."

          python << EOF
          import boto3
          import os

          s3 = boto3.client('s3')
          bucket = '${{ env.S3_BUCKET }}'
          env = '${{ env.ENVIRONMENT }}'
          key = f"predictions/predicciones_{env}.txt"

          try:
              response = s3.head_object(Bucket=bucket, Key=key)
              print(f"✅ Prediction log file exists: {key}")
              print(f"   Last modified: {response['LastModified']}")
              print(f"   Size: {response['ContentLength']} bytes")
          except s3.exceptions.NoSuchKey:
              print(f"⚠️  Prediction log file not found in git: {key}")
              print("   This is expected for first deployment")
          except Exception as e:
              print(f"❌ Error checking prediction log: {e}")
          EOF

      - name: 📊 Deployment Summary
        if: always()
        run: |
          echo "### Deployment Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Deployment completed" >> $GITHUB_STEP_SUMMARY
