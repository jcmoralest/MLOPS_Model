name: Train and Upload Model

on:
  workflow_dispatch:
  push:
    branches: [train-model]

jobs:
  train-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          python scripts/train_model.py

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload model and artifacts to S3
        run: |
          aws s3 cp models/modelo_lstm.onnx s3://proyectofinalmlops/models/modelo_lstm.onnx
          aws s3 cp artifacts/scaler.pkl s3://proyectofinalmlops/artifacts/scaler.pkl
          aws s3 cp artifacts/X_test.npy s3://proyectofinalmlops/artifacts/X_test.npy
          aws s3 cp artifacts/y_test.npy s3://proyectofinalmlops/artifacts/y_test.npy

      - name: Notify success
        run: echo "Modelo entrenado y artefactos subidos a S3 correctamente."